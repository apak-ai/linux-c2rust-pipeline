name: "Stage 1: C to Rust Conversion"

on:
  push:
    branches: [main, 'convert/**']
    paths: ['src/c/**']
  pull_request:
    paths: ['src/c/**']
  workflow_dispatch:
    inputs:
      target_file:
        description: "Specific C file to convert (relative to src/c/), or 'all'"
        required: false
        default: "all"

env:
  RUST_TOOLCHAIN: nightly-2024-12-15   # pin to kernel-supported nightly
  C2RUST_VERSION: "0.20.0"
  KERNEL_RUST_REQ: "1.78.0"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Prepare compilation database for c2rust
  # ─────────────────────────────────────────────
  build-compile-db:
    name: Build Compilation Database
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install kernel build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential flex bison libssl-dev libelf-dev \
            bear clang llvm lld libclang-dev \
            python3-pip dwarves pahole

      - name: Generate compile_commands.json for src/c files
        run: |
          python3 - <<'EOF'
          import json, os, glob

          repo = os.getcwd()
          files = glob.glob("src/c/**/*.c", recursive=True)
          db = [
            {
              "directory": repo,
              "command": f"clang -I/usr/include -Isrc/c -c {f} -o /dev/null",
              "file": os.path.join(repo, f)
            }
            for f in files
          ]
          with open("compile_commands.json", "w") as fh:
            json.dump(db, fh, indent=2)
          print(f"Generated compile_commands.json with {len(db)} entries")
          EOF
          test -f compile_commands.json || { echo "::error::compile_commands.json not generated"; exit 1; }

      - name: Determine files to convert
        id: set-matrix
        run: |
          TARGET="${{ github.event.inputs.target_file || 'all' }}"
          if [ "$TARGET" = "all" ]; then
            # Collect all C files tracked in src/c/
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'src/c/*.c' 2>/dev/null || find src/c -name '*.c' | head -50)
          else
            FILES="src/c/$TARGET"
          fi
          # Build JSON matrix
          JSON=$(python3 -c "
          import json, sys
          files = [f.strip() for f in '''$FILES'''.splitlines() if f.strip()]
          print(json.dumps({'file': files}))
          ")
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Files to convert: $FILES"

      - uses: actions/upload-artifact@v4
        with:
          name: compile-db
          path: compile_commands.json
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2: Transpile each C file to Rust (unsafe)
  # ─────────────────────────────────────────────
  transpile:
    name: "Transpile ${{ matrix.file }}"
    needs: build-compile-db
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-compile-db.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: compile-db

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache c2rust install
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/c2rust
          key: c2rust-${{ env.C2RUST_VERSION }}-${{ runner.os }}

      - name: Install c2rust
        run: |
          if ! command -v c2rust &>/dev/null; then
            sudo apt-get install -y libclang-dev cmake pkg-config python3
            cargo install c2rust --version "$C2RUST_VERSION" --locked
          fi

      - name: Transpile C → unsafe Rust
        id: transpile
        run: |
          FILE="${{ matrix.file }}"
          STEM=$(basename "$FILE" .c)
          OUT_DIR="src/rust/generated/${STEM}"
          mkdir -p "$OUT_DIR"

          c2rust transpile compile_commands.json \
            --output-dir "$OUT_DIR" \
            --overwrite-existing \
            --reorganize-definitions \
            --translate-const-macros \
            2>&1 | tee transpile_${STEM}.log

          echo "out_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          echo "stem=$STEM"       >> "$GITHUB_OUTPUT"

      - name: Apply idiomatic Rust transforms
        run: |
          bash scripts/idiomize.sh "${{ steps.transpile.outputs.out_dir }}" 2>&1

      - name: rustfmt generated code
        run: |
          rustfmt +${{ env.RUST_TOOLCHAIN }} \
            --edition 2021 \
            ${{ steps.transpile.outputs.out_dir }}/*.rs || true

      - name: Count unsafe blocks (baseline)
        run: |
          UNSAFE=$(grep -rn 'unsafe' "${{ steps.transpile.outputs.out_dir }}" | wc -l)
          echo "### Unsafe block count: $UNSAFE" >> "$GITHUB_STEP_SUMMARY"
          echo "unsafe_count=$UNSAFE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: rust-generated-${{ steps.transpile.outputs.stem }}
          path: |
            src/rust/generated/${{ steps.transpile.outputs.stem }}/
            transpile_${{ steps.transpile.outputs.stem }}.log
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 3: Collect all generated files and create PR
  # ─────────────────────────────────────────────
  open-conversion-pr:
    name: Open Conversion PR
    needs: transpile
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: rust-generated-*
          path: src/rust/generated/
          merge-multiple: true

      - name: Ensure labels exist
        run: |
          gh label create "c2rust"                 --color "0075ca" --description "C to Rust conversion" --force
          gh label create "needs-security-review"  --color "e4e669" --description "Requires security audit" --force
          gh label create "needs-compat-check"     --color "d93f0b" --description "Requires compatibility check" --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated Rust files
        run: |
          git config user.name  "c2rust-bot"
          git config user.email "c2rust-bot@users.noreply.github.com"
          BRANCH="convert/rust-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add src/rust/generated/
          git commit -m "chore(convert): auto-transpile C sources to unsafe Rust

          Generated by c2rust ${{ env.C2RUST_VERSION }} on $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Subsequent stages will audit, refactor, and verify compatibility."
          git push origin "$BRANCH"
          gh pr create \
            --title "Convert: C→Rust transpilation batch $(date +%Y-%m-%d)" \
            --body "$(cat .github/PR_TEMPLATE_CONVERT.md)" \
            --label "c2rust,needs-security-review,needs-compat-check" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
